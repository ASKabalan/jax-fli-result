[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "jax-fli-launcher"
version = "0.1.0"
description = "CLI and GUI launcher for jax-fli simulation jobs"
requires-python = ">=3.10"
dependencies = [
    "jax-fli[all] @ git+https://github.com/ASKabalan/jax-fli",
    "streamlit>=1.30",
    "matplotlib>=3.0",
    "plotly>=5.0",
]

[tool.setuptools.packages.find]
include = ["launcher*", "app*"]
